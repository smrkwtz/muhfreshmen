name: Run Freshman Reliance Pipeline

on:
  workflow_dispatch:
    inputs:
      from_step:
        description: "Start from step (1-5). Use to resume after a partial run."
        required: false
        default: "1"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/freshman-reliance-tournament-analysis-dxuKH

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore any previously uploaded artifacts so cached steps are skipped.
      - name: Restore tournament results (if available)
        uses: actions/download-artifact@v4
        with:
          name: tournament-results
          path: data/raw/
        continue-on-error: true

      - name: Restore efficiency ratings (if available)
        uses: actions/download-artifact@v4
        with:
          name: efficiency-ratings
          path: data/raw/
        continue-on-error: true

      - name: Restore player class stats (if available)
        uses: actions/download-artifact@v4
        with:
          name: player-class-stats
          path: data/raw/
        continue-on-error: true

      - name: "Step 1: Scrape tournament results"
        if: ${{ inputs.from_step <= '1' }}
        run: python run_pipeline.py --step 1

      - name: Upload tournament results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tournament-results
          path: data/raw/tournament_results.csv
          overwrite: true

      - name: "Step 2: Fetch efficiency ratings (Barttorvik)"
        if: ${{ inputs.from_step <= '2' }}
        run: python run_pipeline.py --step 2

      - name: Upload efficiency ratings
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: efficiency-ratings
          path: data/raw/efficiency_ratings.csv
          overwrite: true

      - name: "Step 3: Fetch player class stats (~2 hours)"
        if: ${{ inputs.from_step <= '3' }}
        run: python run_pipeline.py --step 3

      - name: Upload player class stats
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: player-class-stats
          path: data/raw/player_class_stats.csv
          overwrite: true

      - name: "Step 4: Build merged analysis dataset"
        run: python run_pipeline.py --step 4

      - name: "Step 5: Run regressions and generate figures"
        run: python run_pipeline.py --step 5

      - name: Upload final results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results
          path: |
            data/processed/analysis_dataset.csv
            analysis/figures/
          overwrite: true
          retention-days: 90
