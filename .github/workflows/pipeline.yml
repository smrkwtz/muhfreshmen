name: Run Freshman Reliance Pipeline

on:
  workflow_dispatch:
    inputs:
      skip_step3:
        description: "Skip step 3 (player class stats)? Set to 'true' if CSV already committed."
        required: false
        default: "false"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/freshman-reliance-tournament-analysis-dxuKH

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: "Step 1: Scrape tournament results (~4 min)"
        run: python run_pipeline.py --step 1

      - name: "Step 2: Load efficiency ratings (Barttorvik exports)"
        run: python run_pipeline.py --step 2

      - name: "Diagnose: probe sports-reference page structure"
        run: |
          python - <<'EOF'
          import requests
          from bs4 import BeautifulSoup, Comment

          ua = "Mozilla/5.0 (compatible; research/academic project)"
          url = "https://www.sports-reference.com/cbb/schools/duke/men/2024.html"
          try:
              resp = requests.get(url, headers={"User-Agent": ua}, timeout=30)
          except Exception as e:
              print(f"Request failed: {e}")
              raise SystemExit(0)

          print(f"Status: {resp.status_code}")
          body = resp.text
          print(f"Body length: {len(body)}")
          print(f"Has 'cloudflare': {'cloudflare' in body.lower()}")
          print(f"Has 'sports-reference': {'sports-reference' in body.lower()}")
          print(f"DOM <table> count: {body.count('<table')}")
          print(f"HTML comment count: {body.count('<!--')}")
          print(f"First 600 chars: {body[:600]!r}")

          soup = BeautifulSoup(body, "lxml")
          dom_ids = [t.get("id", "<none>") for t in soup.find_all("table")]
          print(f"\nDOM table IDs: {dom_ids}")

          print("\nComment tables:")
          for comment in soup.find_all(string=lambda t: isinstance(t, Comment)):
              inner = BeautifulSoup(comment, "lxml")
              for t in inner.find_all("table"):
                  tid = t.get("id", "?")
                  thead = t.find("thead")
                  hs = []
                  if thead:
                      hs = [th.get("data-stat", th.get_text(strip=True)) for th in thead.find_all("th")][:15]
                  print(f"  '{tid}': {hs}")
          EOF

      - name: Check if player_class_stats.csv already committed
        id: check-csv
        run: |
          if [ -f "data/raw/player_class_stats.csv" ]; then
            lines=$(wc -l < data/raw/player_class_stats.csv)
            echo "csv_exists=true" >> $GITHUB_OUTPUT
            echo "csv_lines=$lines" >> $GITHUB_OUTPUT
            echo "Found committed player_class_stats.csv with $lines lines"
          else
            echo "csv_exists=false" >> $GITHUB_OUTPUT
            echo "No committed player_class_stats.csv found"
          fi

      - name: Restore step 3 cache (player class stats)
        id: cache-step3
        if: steps.check-csv.outputs.csv_exists != 'true'
        uses: actions/cache/restore@v4
        with:
          path: data/raw/player_class_stats.csv
          key: player-class-stats-v1

      - name: "Step 3: Fetch player class stats (~2 hours)"
        if: |
          inputs.skip_step3 != 'true' &&
          steps.check-csv.outputs.csv_exists != 'true' &&
          steps.cache-step3.outputs.cache-hit != 'true'
        run: python run_pipeline.py --step 3 --force

      - name: Save step 3 cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/raw/player_class_stats.csv
          key: player-class-stats-v1

      - name: "Step 4: Build merged analysis dataset"
        run: python run_pipeline.py --step 4

      - name: "Step 5: Run regressions and generate figures"
        run: python run_pipeline.py --step 5

      - name: Upload final results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results
          path: |
            data/raw/tournament_results.csv
            data/raw/efficiency_ratings.csv
            data/raw/player_class_stats.csv
            data/processed/analysis_dataset.csv
            analysis/figures/
          overwrite: true
          retention-days: 90
