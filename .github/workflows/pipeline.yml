name: Run Freshman Reliance Pipeline

on:
  workflow_dispatch:   # manual trigger from the Actions tab

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6-hour cap; step 3 alone needs ~2 hours

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/freshman-reliance-tournament-analysis-dxuKH

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Fetch one bracket page and print its structure so we can verify
      # the HTML parser is matching the right elements before the full run.
      - name: "Diagnose: inspect 2024 bracket page HTML"
        run: |
          python - <<'EOF'
          import sys, requests
          sys.path.insert(0, "src")
          from bs4 import BeautifulSoup, Comment

          url = "https://www.sports-reference.com/cbb/postseason/2024-ncaa.html"
          headers = {"User-Agent": "Mozilla/5.0 (compatible; research/academic project)"}
          resp = requests.get(url, headers=headers, timeout=30)
          print(f"HTTP status: {resp.status_code}")
          soup = BeautifulSoup(resp.text, "lxml")

          # Check for bracket in visible DOM
          bracket = soup.find("div", id="bracket")
          print(f"#bracket in DOM: {bracket is not None}")

          # Check inside HTML comments
          for c in soup.find_all(string=lambda t: isinstance(t, Comment)):
              if "bracket" in c:
                  inner = BeautifulSoup(c, "lxml")
                  b = inner.find("div", id="bracket")
                  print(f"#bracket in comment: {b is not None}")
                  if b:
                      rounds = b.find_all("div", class_="round")
                      print(f"  round divs found: {len(rounds)}")
                  break

          # List all div IDs
          ids = [t["id"] for t in soup.find_all("div") if t.get("id")]
          print(f"All div IDs: {ids[:40]}")

          # Print first 2000 chars of raw HTML
          print("\n--- First 2000 chars ---")
          print(resp.text[:2000])
          EOF

      # Upload after each slow step so partial results are preserved
      # even if a later step fails.

      - name: "Step 1: Scrape tournament results"
        run: python run_pipeline.py --step 1

      - name: Upload tournament results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tournament-results
          path: data/raw/tournament_results.csv

      - name: "Step 2: Fetch efficiency ratings (Barttorvik)"
        run: python run_pipeline.py --step 2

      - name: Upload efficiency ratings
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: efficiency-ratings
          path: data/raw/efficiency_ratings.csv

      - name: "Step 3: Fetch player class stats (~2 hours)"
        run: python run_pipeline.py --step 3

      - name: Upload player class stats
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: player-class-stats
          path: data/raw/player_class_stats.csv

      - name: "Step 4: Build merged analysis dataset"
        run: python run_pipeline.py --step 4

      - name: "Step 5: Run regressions and generate figures"
        run: python run_pipeline.py --step 5

      - name: Upload final results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results
          path: |
            data/processed/analysis_dataset.csv
            analysis/figures/
          retention-days: 90
