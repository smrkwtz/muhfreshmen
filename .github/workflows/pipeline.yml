name: Run Freshman Reliance Pipeline

on:
  workflow_dispatch:
    inputs:
      from_step:
        description: "Start from step (1-5). Skip earlier steps if their data is cached."
        required: false
        default: "1"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/freshman-reliance-tournament-analysis-dxuKH

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Cache persists across runs on the same branch (unlike artifacts).
      # Each step restores its own cache key before running, so re-runs
      # automatically skip steps whose output is already cached.

      - name: Restore step 1 cache (tournament results)
        uses: actions/cache/restore@v4
        with:
          path: data/raw/tournament_results.csv
          key: tournament-results-v1

      - name: Restore step 2 cache (efficiency ratings)
        uses: actions/cache/restore@v4
        with:
          path: data/raw/efficiency_ratings.csv
          key: efficiency-ratings-v1

      - name: Restore step 3 cache (player class stats)
        uses: actions/cache/restore@v4
        with:
          path: data/raw/player_class_stats.csv
          key: player-class-stats-v1

      - name: "Step 1: Scrape tournament results"
        if: ${{ inputs.from_step <= '1' }}
        run: python run_pipeline.py --step 1

      - name: Save step 1 cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/raw/tournament_results.csv
          key: tournament-results-v1

      - name: "Step 2: Fetch efficiency ratings (sports-reference)"
        if: ${{ inputs.from_step <= '2' }}
        run: python run_pipeline.py --step 2

      - name: Save step 2 cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/raw/efficiency_ratings.csv
          key: efficiency-ratings-v1

      - name: "Step 3: Fetch player class stats (~2 hours)"
        if: ${{ inputs.from_step <= '3' }}
        run: python run_pipeline.py --step 3

      - name: Save step 3 cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/raw/player_class_stats.csv
          key: player-class-stats-v1

      - name: "Step 4: Build merged analysis dataset"
        run: python run_pipeline.py --step 4

      - name: "Step 5: Run regressions and generate figures"
        run: python run_pipeline.py --step 5

      - name: Upload final results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results
          path: |
            data/raw/tournament_results.csv
            data/raw/efficiency_ratings.csv
            data/raw/player_class_stats.csv
            data/processed/analysis_dataset.csv
            analysis/figures/
          overwrite: true
          retention-days: 90
