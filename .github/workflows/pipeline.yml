name: Run Freshman Reliance Pipeline

on:
  workflow_dispatch:   # manual trigger from the Actions tab

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6-hour cap; step 3 alone needs ~2 hours

    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/freshman-reliance-tournament-analysis-dxuKH

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Dump the bracket div HTML so we can inspect the actual structure.
      - name: "Diagnose: dump bracket div HTML"
        run: |
          python - <<'EOF'
          import os, requests
          from bs4 import BeautifulSoup, Comment

          for url in [
              "https://www.sports-reference.com/cbb/postseason/men/2024-ncaa.html",
              "https://www.sports-reference.com/cbb/postseason/2024-ncaa.html",
          ]:
              resp = requests.get(url, headers={"User-Agent": "Mozilla/5.0"}, timeout=30)
              print(f"{url} -> {resp.status_code}")
              if resp.status_code == 200:
                  break

          soup = BeautifulSoup(resp.text, "lxml")

          bracket_divs = soup.find_all("div", id="bracket")
          print(f"\nNumber of #bracket divs in DOM: {len(bracket_divs)}")
          for i, div in enumerate(bracket_divs[:2]):
              print(f"\n--- #bracket[{i}] first 2000 chars ---")
              print(str(div)[:2000])

          # Save full HTML as artifact for download + manual inspection
          os.makedirs("diag", exist_ok=True)
          with open("diag/page_2024.html", "w") as f:
              f.write(resp.text)
          print("\nFull page saved to artifact.")
          EOF

      - name: Upload bracket HTML artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bracket-html-2024
          path: diag/page_2024.html
          retention-days: 7

      # Upload after each slow step so partial results are preserved
      # even if a later step fails.

      - name: "Step 1: Scrape tournament results"
        run: python run_pipeline.py --step 1

      - name: Upload tournament results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tournament-results
          path: data/raw/tournament_results.csv

      - name: "Step 2: Fetch efficiency ratings (Barttorvik)"
        run: python run_pipeline.py --step 2

      - name: Upload efficiency ratings
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: efficiency-ratings
          path: data/raw/efficiency_ratings.csv

      - name: "Step 3: Fetch player class stats (~2 hours)"
        run: python run_pipeline.py --step 3

      - name: Upload player class stats
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: player-class-stats
          path: data/raw/player_class_stats.csv

      - name: "Step 4: Build merged analysis dataset"
        run: python run_pipeline.py --step 4

      - name: "Step 5: Run regressions and generate figures"
        run: python run_pipeline.py --step 5

      - name: Upload final results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results
          path: |
            data/processed/analysis_dataset.csv
            analysis/figures/
          retention-days: 90
